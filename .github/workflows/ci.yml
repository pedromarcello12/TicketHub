name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restaurar dependencias
        run: dotnet restore TicketHub.slnx

      - name: Build
        run: dotnet build TicketHub.slnx --no-restore --configuration Release

      - name: Testes
        run: dotnet test TicketHub.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Resultados dos testes
          path: "**/test-results.trx"
          reporter: dotnet-trx
